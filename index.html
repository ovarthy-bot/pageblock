<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PageBlock Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0a0f1a;
      --surface:    #111827;
      --surface2:   #1a2233;
      --border:     #1f2f47;
      --text:       #e2e8f0;
      --muted:      #64748b;
      --blue:       #3b82f6;
      --blue-l:     #93c5fd;
      --purple:     #a78bfa;
      --green:      #22c55e;
      --green-bg:   #052e16;
      --green-t:    #86efac;
      --red:        #ef4444;
      --amber:      #f59e0b;
      --row-h:      76px;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 11px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      flex-shrink: 0;
      z-index: 100;
    }
    .logo {
      display: flex; align-items: center; gap: 9px;
      font-size: 17px; font-weight: 700;
      color: var(--blue-l); letter-spacing: .4px; white-space: nowrap;
    }
    .controls {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .search-wrap { position: relative; }
    .search-wrap svg {
      position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    .search-wrap input {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 7px; padding: 7px 11px 7px 32px;
      color: var(--text); font-size: 13px; width: 250px; outline: none;
      transition: border-color .2s;
    }
    .search-wrap input:focus  { border-color: var(--blue); }
    .search-wrap input::placeholder { color: var(--muted); }

    .stats-badge {
      font-size: 12px; color: var(--muted); background: var(--bg);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 4px 9px; white-space: nowrap;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 13px; border-radius: 7px; border: none; cursor: pointer;
      font-size: 13px; font-weight: 500; white-space: nowrap;
      transition: opacity .15s, transform .1s;
    }
    .btn:hover:not(:disabled) { opacity: .82; }
    .btn:active:not(:disabled) { transform: scale(.97); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-danger  { background: #7f1d1d; color: #fca5a5; border: 1px solid #991b1b; }

    /* ── MAIN ── */
    .main { flex: 1; min-height: 0; display: flex; flex-direction: column; }

    .table-scroll {
      flex: 1; min-height: 0;
      overflow-x: auto; overflow-y: auto; position: relative;
    }

    table {
      width: 100%; border-collapse: collapse;
      min-width: 700px; table-layout: fixed;
    }

    thead { position: sticky; top: 0; z-index: 30; }

    th {
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      padding: 0;
      text-align: left;
      font-size: 11px; font-weight: 700;
      color: var(--blue-l);
      text-transform: uppercase; letter-spacing: .9px;
      white-space: nowrap;
      position: relative;
      vertical-align: top;
    }
    th.filter-active { color: var(--amber); }

    .th-inner {
      display: flex; align-items: center; justify-content: space-between;
      gap: 4px; padding: 10px 14px;
    }
    .th-label { flex: 1; min-width: 0; }

    /* Filter button inside th */
    .flt-btn {
      flex-shrink: 0;
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 2px 3px; border-radius: 4px;
      display: flex; align-items: center;
      transition: color .15s, background .15s;
    }
    .flt-btn:hover { color: var(--text); background: var(--border); }
    th.filter-active .flt-btn { color: var(--amber); }

    /* Filter dropdown panel */
    .flt-panel {
      display: none; position: absolute;
      top: calc(100% + 2px); left: 0;
      min-width: 230px; max-width: 320px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 9px; z-index: 200;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,.55);
      overflow: hidden;
    }
    .flt-panel.open { display: flex; }

    .flt-search {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
    }
    .flt-search input {
      width: 100%; background: var(--bg);
      border: 1px solid var(--border); border-radius: 5px;
      padding: 5px 9px; color: var(--text); font-size: 12px; outline: none;
    }
    .flt-search input:focus { border-color: var(--blue); }

    .flt-list {
      overflow-y: auto; max-height: 240px;
      padding: 4px 0;
    }
    .flt-item {
      padding: 6px 14px; font-size: 12px; cursor: pointer;
      color: var(--text); transition: background .1s;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .flt-item:hover { background: var(--border); }
    .flt-item.sel   { color: var(--amber); font-weight: 600; }
    .flt-item.all   { color: var(--muted); border-bottom: 1px solid var(--border); margin-bottom: 2px; }
    .flt-item.all.sel { color: var(--blue-l); }
    .flt-more {
      padding: 5px 14px; font-size: 11px; color: var(--muted);
      border-top: 1px solid var(--border);
    }

    /* Column widths */
    .col-work { width: 40%; }
    .col-type { width: 20%; }
    .col-ref  { width: 30%; }
    .col-ac   { width: 10%; }

    tbody tr.vrow {
      height: var(--row-h);
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    tbody tr.vrow:hover { background: var(--surface2); }
    tbody tr.vrow:nth-child(even) { background: rgba(17,24,39,.5); }
    tbody tr.vrow:nth-child(even):hover { background: var(--surface2); }

    td {
      padding: 8px 14px; font-size: 13px;
      line-height: 1.55; vertical-align: top; overflow: hidden;
    }

    .cell-clamp {
      display: -webkit-box; -webkit-line-clamp: 3;
      -webkit-box-orient: vertical; overflow: hidden;
      cursor: pointer; color: var(--text); transition: color .15s;
    }
    .cell-clamp:hover { color: var(--blue-l); }

    .type-tag {
      display: inline-block; background: #1e3a5f;
      color: var(--blue-l); padding: 2px 8px;
      border-radius: 5px; font-size: 12px; font-weight: 500;
      word-break: break-word;
    }
    .ref-val {
      color: var(--purple);
      font-family: 'Consolas','Courier New',monospace;
      font-size: 12px; line-height: 1.6;
    }
    .ac-badge {
      display: inline-block; background: var(--green-bg);
      color: var(--green-t); padding: 2px 7px;
      border-radius: 5px; font-size: 12px; font-weight: 600;
      letter-spacing: .4px; white-space: nowrap;
    }

    mark { background: #854d0e; color: #fde68a; border-radius: 2px; padding: 0 2px; }

    /* ── STATES ── */
    .state-screen {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; height: 340px; color: var(--muted);
    }
    .state-screen h3 { font-size: 16px; color: #475569; }
    .state-screen p  { font-size: 13px; text-align: center; max-width: 300px; }

    .spinner {
      width: 27px; height: 27px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── OVERLAY ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.75);
      z-index: 500; display: flex; align-items: center; justify-content: center;
    }
    .overlay-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 13px; padding: 30px 42px;
      text-align: center; min-width: 300px; max-width: 90vw;
    }
    .overlay-box .spinner { margin: 0 auto 16px; }
    .overlay-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .overlay-sub   { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .prog-track {
      background: var(--border); border-radius: 999px;
      height: 7px; margin-top: 14px; overflow: hidden;
    }
    .prog-fill {
      background: var(--blue); height: 100%;
      border-radius: 999px; transition: width .3s;
    }

    /* ── MODAL ── */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,.7);
      z-index: 300; display: none;
      align-items: center; justify-content: center; padding: 18px;
    }
    .modal-bg.open { display: flex; }
    .modal-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 13px; padding: 22px;
      max-width: 660px; width: 100%;
      max-height: 80vh; overflow-y: auto; position: relative;
    }
    .modal-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--blue-l); margin-bottom: 11px;
    }
    .modal-text {
      font-size: 14px; line-height: 1.75; color: #cbd5e1;
      white-space: pre-wrap; word-break: break-word;
    }
    .modal-close {
      position: absolute; top: 14px; right: 14px;
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 19px; line-height: 1;
      padding: 4px; border-radius: 4px; transition: color .15s;
    }
    .modal-close:hover { color: var(--text); }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 9px; padding: 10px 16px; font-size: 13px;
      z-index: 1000; max-width: 320px;
      box-shadow: 0 8px 28px rgba(0,0,0,.5);
      transform: translateY(70px); opacity: 0;
      transition: all .28s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none;
    }
    .toast.show    { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--green); color: var(--green-t); }
    .toast.error   { border-color: var(--red);   color: #fca5a5; }
    .toast.info    { border-color: var(--blue);   color: var(--blue-l); }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      header { padding: 9px 11px; }
      .search-wrap input { width: 175px; }
      .logo span { display: none; }
      th .th-inner { padding: 8px 9px; }
      td { padding: 7px 9px; font-size: 12px; }
    }
    @media (max-width: 420px) {
      .search-wrap input { width: 140px; }
      .btn-text { display: none; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <svg width="21" height="21" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 8.414V19a2 2 0 01-2 2z"/>
    </svg>
    <span>PageBlock Dashboard</span>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
        <circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Filtrelenen veride ara…" autocomplete="off">
    </div>
    <div class="stats-badge" id="statsLabel">—</div>
    <button class="btn btn-primary" id="importBtn">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
      </svg>
      <span class="btn-text">Excel İmport</span>
    </button>
    <button class="btn btn-danger" id="clearBtn" style="display:none">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
      </svg>
      <span class="btn-text">Temizle</span>
    </button>
    <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">

</header>

<!-- MAIN -->
<div class="main">
  <div class="table-scroll" id="tableScroll">

    <div class="state-screen" id="stateLoading">
      <div class="spinner"></div>
      <p>Veriler Firebase'den yükleniyor…</p>
    </div>

    <div class="state-screen" id="stateEmpty" style="display:none">
      <svg width="54" height="54" fill="none" viewBox="0 0 24 24" stroke="#334155" stroke-width="1.3">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 8.414V19a2 2 0 01-2 2z"/>
      </svg>
      <h3>Veri bulunamadı</h3>
      <p>Excel dosyası import edin veya filtre kriterlerini değiştirin.</p>
    </div>

    <div id="tableWrap" style="display:none">
      <table>
        <thead>
          <tr id="theadRow">
            <!-- TH'lar JS ile oluşturuluyor -->
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

  </div>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay" style="display:none">
  <div class="overlay-box">
    <div class="spinner"></div>
    <div class="overlay-title" id="overlayTitle">İşleniyor…</div>
    <div class="overlay-sub"  id="overlaySub"></div>
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal-box">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-label">WORK ACCOMPLISHED</div>
    <div class="modal-text" id="modalText"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, collection, getDocs, writeBatch, doc }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const app = initializeApp({
  apiKey:            'AIzaSyCIthKHSFQjFbhCNpJuXpPiz3lPdOw-9d4',
  authDomain:        'pageblock-ffa5f.firebaseapp.com',
  projectId:         'pageblock-ffa5f',
  storageBucket:     'pageblock-ffa5f.firebasestorage.app',
  messagingSenderId: '181336631491',
  appId:             '1:181336631491:web:3e0f21f8ac7c46f6349a76'
});
const db  = getFirestore(app);
const COL = 'pageblocks';

/* ─── State ─── */
let allData      = [];
let filteredData = [];
let searchTerm   = '';
const colFilters = { work: '', acType: '', reference: '', ac: '' };

const ROW_H  = 76;
const BUFFER = 12;

/* ─── Column definitions ─── */
const COLS = [
  { key: 'work',      label: 'WORK ACCOMPLISHED', cls: 'col-work' },
  { key: 'acType',    label: 'A/C TYPE',           cls: 'col-type' },
  { key: 'reference', label: 'REFERENCE',          cls: 'col-ref'  },
  { key: 'ac',        label: 'A/C',                cls: 'col-ac'   },
];

/* ─── DOM ─── */
const tableScroll  = document.getElementById('tableScroll');
const tableWrap    = document.getElementById('tableWrap');
const theadRow     = document.getElementById('theadRow');
const tbody        = document.getElementById('tbody');
const stateLoading = document.getElementById('stateLoading');
const stateEmpty   = document.getElementById('stateEmpty');
const statsLabel   = document.getElementById('statsLabel');
const searchInput  = document.getElementById('searchInput');
const importBtn    = document.getElementById('importBtn');
const clearBtn     = document.getElementById('clearBtn');
const fileInput    = document.getElementById('fileInput');
const overlay      = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlaySub   = document.getElementById('overlaySub');
const progFill     = document.getElementById('progFill');
const modalBg      = document.getElementById('modalBg');
const modalText    = document.getElementById('modalText');
const modalClose   = document.getElementById('modalClose');
const toast        = document.getElementById('toast');

/* ─── Utilities ─── */
let toastT;
function showToast(msg, type = 'info') {
  clearTimeout(toastT);
  toast.textContent = msg;
  toast.className   = `toast ${type} show`;
  toastT = setTimeout(() => { toast.className = 'toast'; }, 3600);
}

function setOverlay(show, title = '', sub = '', pct = 0) {
  overlay.style.display    = show ? 'flex' : 'none';
  overlayTitle.textContent = title;
  overlaySub.textContent   = sub;
  progFill.style.width     = pct + '%';
}

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escRx(s) { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

function hl(text, term) {
  const safe = esc(text);
  if (!term) return safe;
  return safe.replace(new RegExp(`(${escRx(esc(term))})`, 'gi'), '<mark>$1</mark>');
}

/* Page koşulu kaldırıldı — sadece CMM ve AMM */
function extractRef(text) {
  if (!text) return '';
  const m = text.match(/(CMM|AMM)[\s\S]*/i);
  return m ? m[0].replace(/\r/g, '').trim() : '';
}

function cleanText(t) { return (t ?? '').replace(/\r/g, '').trim(); }

/* ─── Build thead with filter dropdowns ─── */
function buildThead() {
  theadRow.innerHTML = '';
  COLS.forEach(col => {
    const th = document.createElement('th');
    th.className = col.cls;
    th.id = `th-${col.key}`;
    th.innerHTML = `
      <div class="th-inner">
        <span class="th-label">${col.label}</span>
        <button class="flt-btn" title="Filtrele" data-col="${col.key}">
          <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2a1 1 0 01-.293.707L13 13.414V19a1 1 0 01-.553.894l-4 2A1 1 0 017 21v-7.586L3.293 6.707A1 1 0 013 6V4z"/>
          </svg>
        </button>
      </div>
      <div class="flt-panel" id="fpanel-${col.key}">
        <div class="flt-search">
          <input type="text" placeholder="Değer ara…" id="fsearch-${col.key}">
        </div>
        <div class="flt-list" id="flist-${col.key}"></div>
      </div>`;
    theadRow.appendChild(th);
  });

  /* Attach filter button events */
  theadRow.querySelectorAll('.flt-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const col   = btn.dataset.col;
      const panel = document.getElementById(`fpanel-${col}`);
      const isOpen = panel.classList.contains('open');
      closeAllPanels();
      if (!isOpen) {
        populatePanel(col);
        panel.classList.add('open');
        document.getElementById(`fsearch-${col}`).focus();
      }
    });
  });
}

function closeAllPanels() {
  document.querySelectorAll('.flt-panel.open').forEach(p => p.classList.remove('open'));
}

function populatePanel(col) {
  const vals   = [...new Set(allData.map(r => r[col] || '').filter(Boolean))].sort();
  const list   = document.getElementById(`flist-${col}`);
  const search = document.getElementById(`fsearch-${col}`);

  search.value = colFilters[col]; // mevcut filtre değerini göster

  function renderList(term) {
    const visible = term ? vals.filter(v => v.toLowerCase().includes(term.toLowerCase())) : vals;
    const MAX     = 200;
    let html = `<div class="flt-item all${!colFilters[col] ? ' sel' : ''}" data-v="">Tümü (filtre yok)</div>`;
    visible.slice(0, MAX).forEach(v => {
      html += `<div class="flt-item${v === colFilters[col] ? ' sel' : ''}" data-v="${esc(v)}" title="${esc(v)}">${esc(v)}</div>`;
    });
    if (visible.length > MAX)
      html += `<div class="flt-more">+${visible.length - MAX} daha — aramayı daraltın</div>`;
    list.innerHTML = html;

    list.querySelectorAll('.flt-item').forEach(item => {
      item.addEventListener('click', () => {
        colFilters[col] = item.dataset.v;
        search.value    = item.dataset.v;
        closeAllPanels();
        updateFilterHeads();
        applyFilter();
      });
    });
  }

  // Yazılan metin hem listeyi hem tabloyu anında filtreler (kısmi eşleşme)
  let typeTimer;
  search.oninput = () => {
    const term = search.value.trim();
    renderList(term);
    clearTimeout(typeTimer);
    typeTimer = setTimeout(() => {
      colFilters[col] = term;
      updateFilterHeads();
      applyFilter();
    }, 250);
  };

  renderList(colFilters[col]);
}

function updateFilterHeads() {
  COLS.forEach(col => {
    const th = document.getElementById(`th-${col.key}`);
    if (th) th.classList.toggle('filter-active', !!colFilters[col.key]);
  });
}

/* ─── Filter + Search ─── */
function getBaseData() {
  let base = allData;
  if (colFilters.work)      base = base.filter(r => (r.work      || '').toLowerCase().includes(colFilters.work.toLowerCase()));
  if (colFilters.acType)    base = base.filter(r => (r.acType    || '').toLowerCase().includes(colFilters.acType.toLowerCase()));
  if (colFilters.reference) base = base.filter(r => (r.reference || '').toLowerCase().includes(colFilters.reference.toLowerCase()));
  if (colFilters.ac)        base = base.filter(r => (r.ac        || '').toLowerCase().includes(colFilters.ac.toLowerCase()));
  return base;
}

function applyFilter() {
  searchTerm = searchInput.value.trim().toLowerCase();
  const base = getBaseData();

  /* Search ONLY within column-filtered data */
  filteredData = searchTerm
    ? base.filter(r =>
        (r.work      || '').toLowerCase().includes(searchTerm) ||
        (r.acType    || '').toLowerCase().includes(searchTerm) ||
        (r.reference || '').toLowerCase().includes(searchTerm) ||
        (r.ac        || '').toLowerCase().includes(searchTerm)
      )
    : base;

  updateStats();
  tableScroll.scrollTop = 0;
  renderAll();
}

function hasActiveFilters() { return Object.values(colFilters).some(v => v !== ''); }

function updateStats() {
  if (!allData.length) { statsLabel.textContent = 'Veri yok'; return; }
  const anyFilter = hasActiveFilters() || searchTerm;
  statsLabel.textContent = anyFilter
    ? `${filteredData.length.toLocaleString()} / ${allData.length.toLocaleString()} kayıt`
    : `${allData.length.toLocaleString()} kayıt`;
}

/* ─── Virtual Scroll ─── */
function renderAll() {
  if (!filteredData.length) {
    tableWrap.style.display  = 'none';
    stateEmpty.style.display = 'flex';
    return;
  }
  stateEmpty.style.display = 'none';
  tableWrap.style.display  = 'block';
  renderRows();
}

function getRange() {
  const top    = tableScroll.scrollTop;
  const height = tableScroll.clientHeight;
  const start  = Math.max(0, Math.floor((top - 44) / ROW_H) - BUFFER);
  const end    = Math.min(filteredData.length, Math.ceil((top - 44 + height) / ROW_H) + BUFFER);
  return { start, end };
}

function renderRows() {
  const total      = filteredData.length;
  const { start, end } = getRange();
  const html = [];

  if (start > 0)
    html.push(`<tr style="height:${start * ROW_H}px"><td colspan="4" style="padding:0;border:none"></td></tr>`);

  for (let i = start; i < end; i++) {
    const r = filteredData[i];
    html.push(`
      <tr class="vrow">
        <td><div class="cell-clamp" data-i="${i}">${hl(r.work,      searchTerm)}</div></td>
        <td><span class="type-tag"             >${hl(r.acType,   searchTerm)}</span></td>
        <td><div class="ref-val"               >${hl(r.reference,searchTerm)}</div></td>
        <td><span class="ac-badge"             >${hl(r.ac,       searchTerm)}</span></td>
      </tr>`);
  }

  if (end < total)
    html.push(`<tr style="height:${(total - end) * ROW_H}px"><td colspan="4" style="padding:0;border:none"></td></tr>`);

  tbody.innerHTML = html.join('');

  tbody.querySelectorAll('.cell-clamp').forEach(el => {
    el.addEventListener('click', () => {
      modalText.textContent = filteredData[+el.dataset.i]?.work || '';
      modalBg.classList.add('open');
    });
  });
}

let rafPending = false;
tableScroll.addEventListener('scroll', () => {
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(() => { renderRows(); rafPending = false; });
});

window.addEventListener('resize', () => { if (filteredData.length) renderRows(); });

/* Close filter panels on outside click */
document.addEventListener('click', () => closeAllPanels());

/* ─── Search ─── */
let searchTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilter, 280);
});

/* ─── Load from Firestore ─── */
async function loadData() {
  stateLoading.style.display = 'flex';
  tableWrap.style.display    = 'none';
  stateEmpty.style.display   = 'none';
  statsLabel.textContent     = '—';
  try {
    const snap = await getDocs(collection(db, COL));
    allData = snap.docs.map(d => d.data());
    applyFilter();
    stateLoading.style.display = 'none';
    if (allData.length) {
      clearBtn.style.display = 'inline-flex';
      showToast(`${allData.length.toLocaleString()} kayıt yüklendi`, 'success');
    }
  } catch (e) {
    stateLoading.style.display = 'none';
    stateEmpty.style.display   = 'flex';
    console.error(e);
    showToast('Bağlantı hatası: ' + e.message, 'error');
  }
}

/* ─── Excel Import ─── */
importBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  fileInput.value = '';
  try {
    setOverlay(true, 'Excel okunuyor…', '', 5);
    const buf  = await file.arrayBuffer();
    const wb   = XLSX.read(buf, { type: 'array' });
    const ws   = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });

    setOverlay(true, 'Veriler işleniyor…', `${rows.length - 1} satır taranıyor`, 20);

    const seen    = new Set(allData.map(r => r.work));
    const newRecs = [];
    for (let i = 1; i < rows.length; i++) {
      const row  = rows[i];
      if (!row?.length) continue;
      const dRaw = String(row[3] ?? '').trim();
      const gRaw = String(row[6] ?? '').trim();
      const jRaw = String(row[9] ?? '').trim();
      if (!dRaw) continue;
      const work = cleanText(dRaw);
      if (seen.has(work)) continue;
      seen.add(work);
      newRecs.push({ work, acType: gRaw, reference: extractRef(dRaw), ac: jRaw });
    }

    if (!newRecs.length) {
      setOverlay(false);
      showToast('Yeni (tekrarsız) kayıt bulunamadı', 'info');
      return;
    }

    const BATCH = 450;
    let written  = 0;
    for (let i = 0; i < newRecs.length; i += BATCH) {
      const batch = writeBatch(db);
      newRecs.slice(i, i + BATCH).forEach(rec => batch.set(doc(collection(db, COL)), rec));
      await batch.commit();
      written += Math.min(BATCH, newRecs.length - i);
      setOverlay(true, "Firebase'e yazılıyor…",
        `${written.toLocaleString()} / ${newRecs.length.toLocaleString()} kayıt`,
        25 + Math.round((written / newRecs.length) * 70));
    }

    setOverlay(true, 'Tamamlandı!', '', 100);
    await new Promise(r => setTimeout(r, 700));
    setOverlay(false);
    showToast(`${newRecs.length.toLocaleString()} kayıt eklendi`, 'success');
    await loadData();
  } catch (err) {
    console.error(err);
    setOverlay(false);
    showToast('Import hatası: ' + err.message, 'error');
  }
});

/* ─── Clear ─── */
clearBtn.addEventListener('click', async () => {
  if (!confirm(`Toplam ${allData.length.toLocaleString()} kayıt kalıcı olarak silinecek. Devam edilsin mi?`)) return;
  try {
    setOverlay(true, 'Veriler siliniyor…', '', 0);
    const snap  = await getDocs(collection(db, COL));
    const total = snap.docs.length;
    const BATCH = 450;
    let deleted = 0;
    for (let i = 0; i < snap.docs.length; i += BATCH) {
      const batch = writeBatch(db);
      snap.docs.slice(i, i + BATCH).forEach(d => batch.delete(d.ref));
      await batch.commit();
      deleted += Math.min(BATCH, snap.docs.length - i);
      setOverlay(true, 'Siliniyor…', `${deleted} / ${total} kayıt`,
        Math.round((deleted / total) * 100));
    }
    setOverlay(false);
    allData = []; filteredData = [];
    clearBtn.style.display = 'none';
    applyFilter();
    showToast('Tüm veriler silindi', 'success');
  } catch (err) {
    console.error(err);
    setOverlay(false);
    showToast('Silme hatası: ' + err.message, 'error');
  }
});

/* ─── Modal ─── */
modalClose.addEventListener('click', () => modalBg.classList.remove('open'));
modalBg.addEventListener('click', e => { if (e.target === modalBg) modalBg.classList.remove('open'); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') modalBg.classList.remove('open'); });

/* ─── Boot ─── */
buildThead();
loadData();
</script>
</body>
</html>
